services:
  # Note: opendataagent is intentionally deployed via opendataagent/deploy/docker-compose.yml
  # and is not part of the root portal compose stack.
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    pull_policy: always
    container_name: opendataworks-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-opendataworks}
      MYSQL_USER: ${MYSQL_USER:-opendataworks}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-opendataworks123}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "3316:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7.2-alpine
    pull_policy: always
    container_name: opendataworks-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    image: ${OPENDATAWORKS_BACKEND_IMAGE:-mikefan2019/opendataworks-backend:latest}
    pull_policy: always
    container_name: opendataworks-backend
    restart: always
    env_file:
      - ./.env
    environment:
      AGENT_API_SERVICE_TOKEN: ${AGENT_API_SERVICE_TOKEN:-odw-agent-service-token}
      AGENT_API_REQUIRE_PRIVATE_NETWORK: ${AGENT_API_REQUIRE_PRIVATE_NETWORK:-true}
    # DolphinScheduler 不包含在本 Compose 中，配置请在系统管理界面进行
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - backend-logs:/app/logs

  # 前端服务
  frontend:
    image: ${OPENDATAWORKS_FRONTEND_IMAGE:-mikefan2019/opendataworks-frontend:latest}
    pull_policy: always
    container_name: opendataworks-frontend
    restart: always
    env_file:
      - ./.env
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
      dataagent-frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  dataagent-frontend:
    image: ${OPENDATAWORKS_DATAAGENT_FRONTEND_IMAGE:-mikefan2019/opendataworks-dataagent-frontend:latest}
    pull_policy: always
    container_name: opendataworks-dataagent-frontend
    restart: always
    ports:
      - "8901:80"
    depends_on:
      dataagent-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # DataAgent 持久化目录初始化（以 root 预创建并修正属主，避免非 root 容器写 /dataagent_runtime 报 permission denied）
  dataagent-home-init:
    image: ${OPENDATAWORKS_DATAAGENT_BACKEND_IMAGE:-mikefan2019/opendataworks-dataagent-backend:latest}
    pull_policy: always
    container_name: opendataworks-dataagent-home-init
    user: "0:0"
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /dataagent_runtime
        chown -R ${DATAAGENT_RUNTIME_UID:-1000}:${DATAAGENT_RUNTIME_GID:-1000} /dataagent_runtime
        chmod -R u+rwX /dataagent_runtime
    volumes:
      - ${DATAAGENT_HOST_ROOT:-/dataagent_runtime}:/dataagent_runtime

  # DataAgent 后端服务（NL2SQL）
  dataagent-backend:
    image: ${OPENDATAWORKS_DATAAGENT_BACKEND_IMAGE:-mikefan2019/opendataworks-dataagent-backend:latest}
    pull_policy: always
    container_name: opendataworks-dataagent-backend
    restart: always
    env_file:
      - ./.env
    user: "${DATAAGENT_RUNTIME_UID:-1000}:${DATAAGENT_RUNTIME_GID:-1000}"
    environment:
      PYTHONUNBUFFERED: "1"
      HOME: /dataagent_runtime
      HOST: 0.0.0.0
      PORT: 8900
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${DATAAGENT_MYSQL_USER:-dataagent}
      MYSQL_PASSWORD: ${DATAAGENT_MYSQL_PASSWORD:-dataagent123}
      MYSQL_DATABASE: ${DATAAGENT_MYSQL_DATABASE:-opendataworks}
      SESSION_MYSQL_DATABASE: ${DATAAGENT_SESSION_MYSQL_DATABASE:-dataagent}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DATAAGENT_REDIS_PASSWORD:-}
      REDIS_DB: ${DATAAGENT_REDIS_DB:-0}
      TASK_MAX_CONCURRENCY: ${DATAAGENT_TASK_MAX_CONCURRENCY:-4}
      TASK_LEASE_TTL_SECONDS: ${DATAAGENT_TASK_LEASE_TTL_SECONDS:-30}
      TASK_HEARTBEAT_SECONDS: ${DATAAGENT_TASK_HEARTBEAT_SECONDS:-5}
      TASK_RECOVERY_SCAN_INTERVAL_SECONDS: ${DATAAGENT_TASK_RECOVERY_SCAN_INTERVAL_SECONDS:-2}
      TASK_RECOVERY_BATCH_SIZE: ${DATAAGENT_TASK_RECOVERY_BATCH_SIZE:-20}
      SCHEDULE_SCAN_INTERVAL_SECONDS: ${DATAAGENT_SCHEDULE_SCAN_INTERVAL_SECONDS:-10}
      SCHEDULE_SCAN_BATCH_SIZE: ${DATAAGENT_SCHEDULE_SCAN_BATCH_SIZE:-10}
      SCHEDULE_LOCK_TTL_SECONDS: ${DATAAGENT_SCHEDULE_LOCK_TTL_SECONDS:-60}
      ODW_BACKEND_BASE_URL: ${ODW_BACKEND_BASE_URL:-http://backend:8080/api/v1/ai}
      ODW_AGENT_SERVICE_TOKEN: ${AGENT_API_SERVICE_TOKEN:-odw-agent-service-token}
      ODW_BACKEND_TIMEOUT_SECONDS: ${ODW_BACKEND_TIMEOUT_SECONDS:-30}
      DATAAGENT_PORTAL_MCP_ENABLED: ${DATAAGENT_PORTAL_MCP_ENABLED:-true}
      DATAAGENT_PORTAL_MCP_BASE_URL: ${DATAAGENT_PORTAL_MCP_BASE_URL:-http://portal-mcp:8801/mcp/}
      DATAAGENT_PORTAL_MCP_TOKEN: ${PORTAL_MCP_TOKEN:-odw-portal-mcp-token}
      DATAAGENT_PORTAL_MCP_TOKEN_HEADER_NAME: ${PORTAL_MCP_TOKEN_HEADER_NAME:-X-Portal-MCP-Token}
      SKILLS_ROOT_DIR: /app/.claude/skills
      DATAAGENT_SANDBOX_MODE: ${DATAAGENT_SANDBOX_MODE:-}
      DATAAGENT_SANDBOX_RUNNER_URL: http://dataagent-sandbox-runner:8910
      DATAAGENT_SANDBOX_IMAGE: ${OPENDATAWORKS_DATAAGENT_RUNNER_IMAGE:-mikefan2019/opendataworks-dataagent-runner:latest}
      DATAAGENT_SANDBOX_BACKEND: ${DATAAGENT_SANDBOX_BACKEND:-docker}
      DATAAGENT_SANDBOX_NETWORK: container:opendataworks-dataagent-sandbox-runner
    ports:
      - "8900:8900"
    depends_on:
      dataagent-home-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      dataagent-sandbox-runner:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8900/api/v1/nl2sql/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - ${DATAAGENT_HOST_ROOT:-/dataagent_runtime}:/dataagent_runtime
      - ${DATAAGENT_SKILLS_DIR:-../dataagent/.claude/skills}:/app/.claude/skills

  # DataAgent 沙箱 Runner（内部服务）
  dataagent-sandbox-runner:
    image: ${OPENDATAWORKS_DATAAGENT_RUNNER_IMAGE:-mikefan2019/opendataworks-dataagent-runner:latest}
    pull_policy: always
    container_name: opendataworks-dataagent-sandbox-runner
    restart: always
    env_file:
      - ./.env
    user: "${DATAAGENT_RUNNER_UID:-0}:${DATAAGENT_RUNNER_GID:-0}"
    environment:
      PYTHONUNBUFFERED: "1"
      HOME: /dataagent_runtime
      DATAAGENT_HOST_ROOT: ${DATAAGENT_HOST_ROOT:-/dataagent_runtime}
      DATAAGENT_SANDBOX_MODE: ""
      DATAAGENT_SANDBOX_IMAGE: ${OPENDATAWORKS_DATAAGENT_RUNNER_IMAGE:-mikefan2019/opendataworks-dataagent-runner:latest}
      DATAAGENT_SANDBOX_BACKEND: ${DATAAGENT_SANDBOX_BACKEND:-docker}
      DATAAGENT_SANDBOX_NETWORK: container:opendataworks-dataagent-sandbox-runner
      DATAAGENT_SANDBOX_REUSE_ENABLED: ${DATAAGENT_SANDBOX_REUSE_ENABLED:-true}
      DATAAGENT_SANDBOX_IDLE_TTL_SECONDS: ${DATAAGENT_SANDBOX_IDLE_TTL_SECONDS:-600}
      DATAAGENT_SANDBOX_MAX_WARM_CONTAINERS: ${DATAAGENT_SANDBOX_MAX_WARM_CONTAINERS:-32}
      DATAAGENT_SANDBOX_REAPER_INTERVAL_SECONDS: ${DATAAGENT_SANDBOX_REAPER_INTERVAL_SECONDS:-30}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${DATAAGENT_MYSQL_USER:-dataagent}
      MYSQL_PASSWORD: ${DATAAGENT_MYSQL_PASSWORD:-dataagent123}
      MYSQL_DATABASE: ${DATAAGENT_MYSQL_DATABASE:-opendataworks}
      SESSION_MYSQL_DATABASE: ${DATAAGENT_SESSION_MYSQL_DATABASE:-dataagent}
      ODW_BACKEND_BASE_URL: ${ODW_BACKEND_BASE_URL:-http://backend:8080/api/v1/ai}
      ODW_AGENT_SERVICE_TOKEN: ${AGENT_API_SERVICE_TOKEN:-odw-agent-service-token}
      ODW_BACKEND_TIMEOUT_SECONDS: ${ODW_BACKEND_TIMEOUT_SECONDS:-30}
      DATAAGENT_PORTAL_MCP_ENABLED: ${DATAAGENT_PORTAL_MCP_ENABLED:-true}
      DATAAGENT_PORTAL_MCP_BASE_URL: ${DATAAGENT_PORTAL_MCP_BASE_URL:-http://portal-mcp:8801/mcp/}
      DATAAGENT_PORTAL_MCP_TOKEN: ${PORTAL_MCP_TOKEN:-odw-portal-mcp-token}
      DATAAGENT_PORTAL_MCP_TOKEN_HEADER_NAME: ${PORTAL_MCP_TOKEN_HEADER_NAME:-X-Portal-MCP-Token}
      SKILLS_ROOT_DIR: /app/.claude/skills
    depends_on:
      dataagent-home-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8910/').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - ${DATAAGENT_HOST_ROOT:-/dataagent_runtime}:/dataagent_runtime
      - ${DATAAGENT_SKILLS_DIR:-../dataagent/.claude/skills}:/app/.claude/skills
      - ${DATAAGENT_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock

  portal-mcp:
    image: ${OPENDATAWORKS_PORTAL_MCP_IMAGE:-mikefan2019/opendataworks-portal-mcp:latest}
    pull_policy: always
    container_name: opendataworks-portal-mcp
    restart: always
    env_file:
      - ./.env
    environment:
      PORTAL_MCP_HOST: 0.0.0.0
      PORTAL_MCP_PORT: 8801
      PORTAL_MCP_MOUNT_PATH: ${PORTAL_MCP_MOUNT_PATH:-/mcp}
      PORTAL_MCP_BACKEND_BASE_URL: ${PORTAL_MCP_BACKEND_BASE_URL:-http://backend:8080/api}
      PORTAL_MCP_BACKEND_SERVICE_TOKEN: ${AGENT_API_SERVICE_TOKEN:-odw-agent-service-token}
      PORTAL_MCP_BACKEND_TIMEOUT_SECONDS: ${PORTAL_MCP_BACKEND_TIMEOUT_SECONDS:-30}
      PORTAL_MCP_FRONTDOOR_TOKEN: ${PORTAL_MCP_TOKEN:-odw-portal-mcp-token}
      PORTAL_MCP_FRONTDOOR_TOKEN_HEADER_NAME: ${PORTAL_MCP_TOKEN_HEADER_NAME:-X-Portal-MCP-Token}
    ports:
      - "8801:8801"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8801/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
    driver: local
  backend-logs:
    driver: local
