services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-opendataagent}
      MYSQL_USER: ${MYSQL_USER:-opendataagent}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-opendataagent123}
      TZ: Asia/Shanghai
    ports:
      - "${OPENDATAAGENT_MYSQL_PORT:-13306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - opendataagent-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  opendataagent-server:
    build:
      context: ../server
      dockerfile: Dockerfile
    image: opendataagent-server:${OPENDATAAGENT_VERSION:-1.3.0}
    restart: always
    environment:
      ODA_ADDR: :18900
      ODA_STATE_DIR: /var/lib/opendataagent
      ODA_MANAGED_SKILLS_DIR: /var/lib/opendataagent/skills/managed
      ODA_BUNDLED_SKILLS_DIR: /app/skills/bundled
      ODA_SHARED_SKILLS_DIR: /opt/odw-shared-skills
      ODA_STORE_DRIVER: ${ODA_STORE_DRIVER:-mysql}
      ODA_MYSQL_DATABASE: ${ODA_MYSQL_DATABASE:-opendataagent}
      ODA_ADMIN_TOKEN: ${OPENDATAAGENT_ADMIN_TOKEN:-change-me}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-opendataagent}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-opendataagent123}
      SESSION_MYSQL_DATABASE: ${SESSION_MYSQL_DATABASE:-opendataagent}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${OPENDATAAGENT_SERVER_PORT:-18900}:18900"
    volumes:
      - opendataagent-state:/var/lib/opendataagent
      - ${OPENDATAAGENT_SHARED_SKILLS_PATH:-../../skills}:/opt/odw-shared-skills:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18900/api/v1/agent/health"]
      interval: 20s
      timeout: 5s
      retries: 10

  opendataagent-web:
    build:
      context: ../web
      dockerfile: Dockerfile
    image: opendataagent-web:${OPENDATAAGENT_VERSION:-1.3.0}
    restart: always
    environment:
      OPENDATAAGENT_API_UPSTREAM: http://opendataagent-server:18900
      OPENDATAAGENT_ADMIN_TOKEN: ${OPENDATAAGENT_ADMIN_TOKEN:-change-me}
    depends_on:
      opendataagent-server:
        condition: service_healthy
    ports:
      - "${OPENDATAAGENT_WEB_PORT:-18080}:80"

volumes:
  opendataagent-mysql:
  opendataagent-state:
