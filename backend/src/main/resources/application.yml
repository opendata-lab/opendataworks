server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: opendataworks
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/opendataworks?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: opendataworks
    password: opendataworks123
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

doris:
  jdbc:
    url-template: jdbc:mysql://%s:%d/%s?useUnicode=true&characterEncoding=UTF-8&useTimezone=true&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=300000
    default-database: information_schema
    session-charset-enabled: true
    session-charset: utf8mb4
    session-charset-fallback: utf8

metadata:
  statistics-sync:
    fixed-delay-ms: 600000

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.onedata.portal.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# DolphinScheduler 配置由数据库 dolphin_config 表管理，可在系统管理界面配置

# 日志配置
logging:
  level:
    com.onedata.portal: debug
    org.springframework.web: info

# 认证配置（odw-auth 模块，详见 docs/design/2026-05-30-odw-auth-module-design.md）
odw:
  auth:
    enabled: true
    jwt:
      secret: ${AUTH_JWT_SECRET:opendataworks-dev-jwt-secret-change-me}
      issuer: ${AUTH_JWT_ISSUER:opendataworks}
      ttl: ${AUTH_JWT_TTL:8h}
    session:
      cookie-name: odw_session
      same-site: Lax
      secure: ${AUTH_COOKIE_SECURE:false}
    anonymous:
      # 临时回滚开关：true 时会话缺失回退为匿名 admin（恢复旧行为）
      enabled: ${AUTH_ANONYMOUS_ENABLED:false}
      user-id: 1
      username: admin

workflow:
  runtime-sync:
    enabled: true
    ingest-mode: export_only

agent:
  api:
    service-token: ${AGENT_API_SERVICE_TOKEN:}
    token-header-name: ${AGENT_API_TOKEN_HEADER_NAME:X-Agent-Service-Token}
    require-private-network: ${AGENT_API_REQUIRE_PRIVATE_NETWORK:true}
