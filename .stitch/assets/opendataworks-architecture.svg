<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">OpenDataWorks product architecture diagram</title>
  <desc id="desc">A professional architecture diagram showing OpenDataWorks Web Portal, platform backend, workflow and lineage services, DataAgent, runtime services, integrations, and data stores.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7FBFA"/>
      <stop offset="55%" stop-color="#EEF7F4"/>
      <stop offset="100%" stop-color="#F5F7FF"/>
    </linearGradient>
    <linearGradient id="portal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E7FFFA"/>
      <stop offset="100%" stop-color="#DDE6FF"/>
    </linearGradient>
    <linearGradient id="backend" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2FAF8"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EBFFF4"/>
      <stop offset="100%" stop-color="#EAF0FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#102321" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-15%" y="-25%" width="130%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#102321" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#00796B"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#365BD6"/>
    </marker>
    <style>
      .font { font-family: "IBM Plex Sans", "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .headline { font-family: "Space Grotesk", "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-weight: 700; }
      .label { font-size: 19px; font-weight: 700; fill: #00796B; }
      .small { font-size: 17px; fill: #5A6664; }
      .tiny { font-size: 14px; fill: #667370; }
      .title { font-size: 28px; font-weight: 700; fill: #24312F; }
      .module { font-size: 20px; font-weight: 700; fill: #263432; }
      .caption { font-size: 15px; fill: #65706E; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="34" fill="url(#page)"/>
  <circle cx="118" cy="96" r="100" fill="#7AF0DF" opacity="0.18"/>
  <circle cx="1460" cy="778" r="136" fill="#365BD6" opacity="0.08"/>
  <circle cx="1350" cy="120" r="86" fill="#62E987" opacity="0.12"/>

  <g class="font">
    <text x="72" y="74" class="headline" font-size="34" fill="#00796B">OpenDataWorks</text>
    <text x="72" y="110" class="small">Unified data portal architecture for metadata, workflow, lineage, and intelligent query</text>
    <rect x="1190" y="48" width="330" height="66" rx="33" fill="#FFFFFF" stroke="#C8D7D4"/>
    <text x="1228" y="76" font-size="17" font-weight="700" fill="#00796B">Deployable Full Stack</text>
    <text x="1228" y="98" font-size="15" fill="#5B6664">Docker Compose · MySQL · Redis</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="62" y="140" width="1476" height="700" rx="30" fill="#FFFFFF" opacity="0.92" stroke="#C5D5D2"/>
  </g>

  <g class="font">
    <text x="112" y="198" class="label">User Entry</text>
    <text x="112" y="228" class="small">Data platform teams, data engineers, analysts, and operators</text>

    <g filter="url(#softShadow)">
      <rect x="112" y="258" width="1376" height="112" rx="22" fill="url(#portal)" stroke="#9BCFC8"/>
      <text x="148" y="304" class="title">Web Portal</text>
      <text x="148" y="335" class="small">Vue 3 + Vite + Element Plus: one workspace for assets, workflows, lineage, and AI query.</text>
      <g>
        <rect x="1032" y="286" width="118" height="38" rx="19" fill="#D8FFF8" stroke="#74DCCF"/>
        <text x="1057" y="311" font-size="15" font-weight="700" fill="#00796B">Data Studio</text>
        <rect x="1164" y="286" width="126" height="38" rx="19" fill="#E4E8FF" stroke="#BCC8FF"/>
        <text x="1189" y="311" font-size="15" font-weight="700" fill="#365BD6">Workflow UI</text>
        <rect x="1304" y="286" width="136" height="38" rx="19" fill="#E4FFE9" stroke="#9AF0AA"/>
        <text x="1329" y="311" font-size="15" font-weight="700" fill="#087B35">Lineage Graph</text>
      </g>
    </g>

    <path d="M800 376 L800 420" stroke="#00796B" stroke-width="3" marker-end="url(#arrowTeal)" fill="none"/>

    <g filter="url(#softShadow)">
      <rect x="112" y="430" width="430" height="190" rx="22" fill="url(#backend)" stroke="#C8D7D4"/>
      <rect x="148" y="468" width="58" height="58" rx="16" fill="#D8FFF8" stroke="#89E8DA"/>
      <text x="165" y="507" font-size="30" fill="#00796B">▦</text>
      <text x="226" y="490" class="module">Platform Backend</text>
      <text x="226" y="522" class="caption">Java 8 · Spring Boot 2.7 · MyBatis-Plus</text>
      <line x1="148" y1="552" x2="506" y2="552" stroke="#D8E4E1"/>
      <text x="148" y="584" class="small">Metadata APIs · Asset catalog · Auth</text>
      <text x="148" y="612" class="small">Workflow publishing · Runtime history</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="586" y="430" width="430" height="190" rx="22" fill="#FFFFFF" stroke="#C8D7D4"/>
      <rect x="622" y="468" width="58" height="58" rx="16" fill="#E4E8FF" stroke="#BEC8FF"/>
      <text x="639" y="506" font-size="30" fill="#365BD6">↯</text>
      <text x="700" y="490" class="module">Workflow &amp; Lineage</text>
      <text x="700" y="522" class="caption">DolphinScheduler integration · SQL lineage</text>
      <line x1="622" y1="552" x2="980" y2="552" stroke="#D8E4E1"/>
      <text x="622" y="584" class="small">Visual workflow authoring · Schedule monitor</text>
      <text x="622" y="612" class="small">Upstream / downstream impact analysis</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="1060" y="430" width="428" height="190" rx="22" fill="url(#agent)" stroke="#C8D7D4"/>
      <rect x="1096" y="468" width="58" height="58" rx="16" fill="#E4FFE9" stroke="#99F1A8"/>
      <text x="1113" y="506" font-size="30" fill="#087B35">✦</text>
      <text x="1174" y="490" class="module">DataAgent Backend</text>
      <text x="1174" y="522" class="caption">FastAPI · NL2SQL · Sessions · Streaming events</text>
      <line x1="1096" y1="552" x2="1452" y2="552" stroke="#D8E4E1"/>
      <text x="1096" y="584" class="small">Prompt assembly · Skill execution · SQL run path</text>
      <text x="1096" y="612" class="small">Task coordination · Results</text>
    </g>

    <path d="M542 526 C558 526 570 526 586 526" stroke="#00796B" stroke-width="3" marker-end="url(#arrowTeal)" fill="none"/>
    <path d="M1016 526 C1032 526 1044 526 1060 526" stroke="#00796B" stroke-width="3" marker-end="url(#arrowTeal)" fill="none"/>

    <g>
      <text x="112" y="732" class="label">Runtime &amp; Integrations</text>
      <rect x="112" y="758" width="210" height="54" rx="16" fill="#F2FAF8" stroke="#C8D7D4"/>
      <text x="150" y="792" font-size="18" font-weight="700" fill="#263432">MySQL 8</text>
      <rect x="344" y="758" width="172" height="54" rx="16" fill="#F2FAF8" stroke="#C8D7D4"/>
      <text x="386" y="792" font-size="18" font-weight="700" fill="#263432">Redis</text>
      <rect x="538" y="758" width="268" height="54" rx="16" fill="#F2FAF8" stroke="#C8D7D4"/>
      <text x="580" y="792" font-size="18" font-weight="700" fill="#263432">DolphinScheduler</text>
      <rect x="828" y="758" width="220" height="54" rx="16" fill="#F2FAF8" stroke="#C8D7D4"/>
      <text x="878" y="792" font-size="18" font-weight="700" fill="#263432">Portal MCP</text>
      <rect x="1070" y="758" width="184" height="54" rx="16" fill="#F2FAF8" stroke="#C8D7D4"/>
      <text x="1118" y="792" font-size="18" font-weight="700" fill="#263432">Docker</text>
      <rect x="1276" y="758" width="212" height="54" rx="16" fill="#F2FAF8" stroke="#C8D7D4"/>
      <text x="1320" y="792" font-size="18" font-weight="700" fill="#263432">Data Sources</text>
    </g>

    <g>
      <rect x="520" y="646" width="560" height="48" rx="24" fill="#00796B"/>
      <text x="612" y="676" font-size="18" font-weight="700" fill="#FFFFFF">Catalog → Workflow → Lineage → NL2SQL</text>
    </g>
  </g>
</svg>
