server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 使用 ^~ 确保 /widget/ 前缀优先于下方的静态资源正则匹配，
    # 否则未带哈希的 widget bundle（*.bundle.js）会落入 \.js$ 正则，
    # 被错误地按 1 年 immutable 缓存，升级后客户端拿到旧脚本。
    # bundle 文件名固定不带哈希，必须用 no-cache 协商缓存（ETag/304），
    # 否则升级后嵌入方仍可能在 max-age 窗口内运行旧 bundle。
    location ^~ /widget/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location /api/v1/dataagent/ {
        proxy_pass http://dataagent-backend:8900/api/v1/dataagent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/nl2sql-admin/ {
        proxy_pass http://dataagent-backend:8900/api/v1/nl2sql-admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/nl2sql/ {
        proxy_pass http://dataagent-backend:8900/api/v1/nl2sql/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 420s;
        proxy_send_timeout 420s;
        add_header X-Accel-Buffering no;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
