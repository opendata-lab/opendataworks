server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 使用 ^~ 前缀，确保 widget bundle 走短缓存策略，而不是被下方静态资源正则
    # location（immutable 1y）优先匹配，避免离线包升级后浏览器仍使用旧的 widget。
    location ^~ /widget/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300";
    }

    location /api/v1/dataagent/ {
        proxy_pass http://dataagent-backend:8900/api/v1/dataagent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/nl2sql-admin/ {
        proxy_pass http://dataagent-backend:8900/api/v1/nl2sql-admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/nl2sql/ {
        proxy_pass http://dataagent-backend:8900/api/v1/nl2sql/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 420s;
        proxy_send_timeout 420s;
        add_header X-Accel-Buffering no;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
